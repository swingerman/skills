# ~/.config/starship.toml — Starship "pure-style" preset bundled with the
# zenify-my-terminal skill. Two-line, sparse, muted, no clock-watching.
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$java\
$php\
$kubernetes\
$line_break\
$character"""

right_format = """$cmd_duration"""

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[directory]
style              = "bold cyan"
truncation_length  = 3
truncate_to_repo   = true

[git_branch]
symbol = " "
style  = "bold purple"

[git_status]
style = "bold yellow"

[cmd_duration]
min_time = 2_000
format   = "[$duration]($style)"
style    = "yellow"

[kubernetes]
disabled       = false
format         = '[$symbol$context( \($namespace\))]($style) '
symbol         = "☸ "
style          = "bold blue"
detect_files   = ["k8s", "Chart.yaml", "skaffold.yaml"]
detect_folders = [".kube", "kustomize"]

[time]
disabled = true
