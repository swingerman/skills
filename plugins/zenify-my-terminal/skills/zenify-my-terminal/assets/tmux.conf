# ~/.tmux.conf — bundled by zenify-my-terminal.
# Tuned for Claude Code agent-teams + general dev use.
#
# Key principles:
#   - Don't fight your prompt: minimal, dim status bar at the bottom.
#   - Keep the default Ctrl-b prefix (Ctrl-a conflicts with zsh's
#     beginning-of-line, which most users press constantly).
#   - Mouse on, true color on, large scrollback.
#   - Vim-style pane navigation; intuitive | / - splits that inherit cwd.
# Reload: prefix r (defined below).

# --- True color + 256 color ------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB,wezterm:RGB"

# --- Mouse + scrollback ----------------------------------------------------
set -g mouse on
set -g history-limit 100000

# --- Index from 1; renumber on close ---------------------------------------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Faster command sequences ----------------------------------------------
set -s escape-time 10
set -g focus-events on

# --- Status bar (minimal — don't compete with the prompt) ------------------
set -g status-position bottom
set -g status-style "bg=default,fg=colour245"
set -g status-left "#[fg=colour39,bold] #S "
set -g status-left-length 30
set -g status-right "#[fg=colour245] %H:%M "
set -g status-right-length 20
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour39,bold] #I:#W "
set -g window-status-current-style "bg=default"

# --- Pane borders (subtle) -------------------------------------------------
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# --- Splits with intuitive keys, inherit cwd -------------------------------
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"

# --- Vim-style pane navigation (prefix h/j/k/l) ----------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Vim-style pane resizing (prefix H/J/K/L, repeatable) ------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Window cycling --------------------------------------------------------
bind -n M-Left  previous-window
bind -n M-Right next-window

# --- Reload config ---------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# --- Copy-mode: vi keys ----------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# --- Activity awareness ----------------------------------------------------
setw -g monitor-activity on
set -g visual-activity off
