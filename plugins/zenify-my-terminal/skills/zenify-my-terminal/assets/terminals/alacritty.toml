# ~/.config/alacritty/alacritty.toml — bundled by zenify-my-terminal
# Auto-reloads when saved. Theme is imported from a separate file — download
# from https://github.com/alacritty/alacritty-theme and place in ~/.config/alacritty/themes/

[general]
import = ["~/.config/alacritty/themes/tokyo_night_moon.toml"]

[font]
size = 14

[font.normal]
family = "JetBrainsMono Nerd Font"
style  = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style  = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style  = "Italic"

[window]
padding   = { x = 10, y = 10 }
decorations = "buttonless"     # macOS: minimal title bar
opacity   = 1.0
option_as_alt = "Left"

[scrolling]
history = 100000

[selection]
save_to_clipboard = true

# Alacritty has no tabs/splits — use tmux for those. See alacritty.md reference.
