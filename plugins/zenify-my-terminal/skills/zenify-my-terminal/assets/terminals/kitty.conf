# ~/.config/kitty/kitty.conf — bundled by zenify-my-terminal
# Reload: Ctrl-Shift-F5 (default)

# --- Font -------------------------------------------------------------------
font_family       JetBrainsMono Nerd Font
font_size         14.0

# --- Theme (run `kitten themes` to browse and pick interactively) ----------
include themes/tokyo_night_moon.conf

# --- Window -----------------------------------------------------------------
window_padding_width 10
hide_window_decorations titlebar-only
remember_window_size yes

# --- macOS ------------------------------------------------------------------
macos_option_as_alt yes
macos_titlebar_color background

# --- Scrollback -------------------------------------------------------------
scrollback_lines 100000

# --- Tabs ------------------------------------------------------------------
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

# --- Layouts ---------------------------------------------------------------
enabled_layouts splits,tall,fat,grid,stack

# --- Keybindings: remap to Cmd-prefixed for macOS familiarity --------------
# Tabs
map cmd+t       new_tab_with_cwd
map cmd+w       close_tab
map cmd+shift+t set_tab_title
map cmd+1       goto_tab 1
map cmd+2       goto_tab 2
map cmd+3       goto_tab 3
map cmd+4       goto_tab 4
map cmd+5       goto_tab 5
map cmd+6       goto_tab 6
map cmd+7       goto_tab 7
map cmd+8       goto_tab 8
map cmd+9       goto_tab 9

# Splits ("windows" in Kitty terminology)
map cmd+d       launch --location=hsplit --cwd=current
map cmd+shift+d launch --location=vsplit --cwd=current
map cmd+shift+w close_window
map cmd+left    neighboring_window left
map cmd+right   neighboring_window right
map cmd+up      neighboring_window up
map cmd+down    neighboring_window down

# Layouts
map cmd+shift+l next_layout

# Clear scrollback (matches WezTerm Cmd-K)
map cmd+k       clear_terminal scrollback active
